version: "3.9"

services:
  redis:
    image: "redis:alpine"
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
  api:
    build: .
    command: daphne -b 0.0.0.0 -p 8000 core.asgi:application
    volumes:
      - .:/app
    depends_on:
      - redis
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=${REDIS_URL}
volumes: 
  redis_data:
    
