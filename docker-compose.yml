version: "3.9"

services:
  redis:
    image: "redis:alpine"
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
  api:
    build: .
    command: daphne api.asgi:application --host 0.0.0.0 --port 8000
    volumes:
      - .:/app
    depends_on:
      - redis
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
volumes: 
  redis_data:
    
